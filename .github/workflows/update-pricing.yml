name: Update Pricing Data

on:
  schedule:
    - cron: "0 * * * *" # Hourly; commits only when prices actually change
  workflow_dispatch: # Manual trigger

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Run pricing scraper
        # Porkbun's pricing endpoint is public — no keys/secrets required.
        run: node scripts/scrape-pricing.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/pricing.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricing.json
          git commit -m "chore: update pricing data [skip ci]"
          git push
